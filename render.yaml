services:
  - type: web
    name: visitas-leiteiras-api
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: npm install && npm run build:api:cloud
    # Roda as migrations automaticamente antes de cada novo deploy
    preDeployCommand: npm --workspace apps/api run prisma:deploy
    startCommand: npm run start:api:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: visitas-leiteiras-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL_DAYS
        value: 30

databases:
  - name: visitas-leiteiras-db
    plan: free
    region: oregon
    databaseName: visitas_leiteiras
    user: visitas_app
