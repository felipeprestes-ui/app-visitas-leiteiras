name: "Mobile - Publicar no Expo"

# Roda automaticamente quando voce fizer push na branch main
# com mudancas no mobile ou nos pacotes.
# Voce tambem pode rodar manualmente pela aba Actions do GitHub.

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "apps/mobile/**"
      - "packages/**"
      - ".github/workflows/mobile-expo-update.yml"

jobs:
  publish:
    name: "Publicar update no Expo"
    runs-on: ubuntu-latest

    steps:
      - name: "Baixar codigo"
        uses: actions/checkout@v4

      - name: "Configurar Node.js 20"
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: "Instalar dependencias"
        run: npm install

      - name: "Configurar Expo / EAS CLI"
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: "Publicar update (EAS Update)"
        working-directory: apps/mobile
        env:
          EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL }}
          EXPO_OWNER: ${{ vars.EXPO_OWNER }}
          EXPO_PROJECT_ID: ${{ vars.EXPO_PROJECT_ID }}
        run: |
          npx eas update \
            --branch production \
            --channel production \
            --message "commit ${{ github.sha }}" \
            --non-interactive
