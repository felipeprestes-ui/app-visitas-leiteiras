name: "Build APK Android"

on:
  workflow_dispatch:

jobs:
  build:
    name: "Build APK Android"
    runs-on: ubuntu-latest

    steps:
      - name: "Baixar codigo"
        uses: actions/checkout@v4

      - name: "Configurar Node.js 20"
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: "Instalar dependencias"
        run: npm install

      - name: "Configurar Expo / EAS CLI"
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: "Build APK (EAS)"
        run: |
          npx eas build \
            --platform android \
            --profile preview \
            --non-interactive
